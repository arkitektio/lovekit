services:
  redis:
    image: redis:latest
  db:
    image: jhnnsrs/daten_next:nightly
    restart: always
    environment:
      POSTGRES_MULTIPLE_DATABASES: lovekit
      POSTGRES_PASSWORD: hello_django
      POSTGRES_USER: hello_django
  livekit:
    image: livekit/livekit-server:latest
    command: --dev
    environment:
      LIVEKIT_KEYS: "devkey: devsecret_devsecret_devsecret_devsecret"
    ports:
      - 5678:7880
  lovekit:
    depends_on:
      - redis
      - db
      - minio
      - livekit
    image: jhnnsrs/lovekit:${LOVEKIT_SERVICE_TAG:-next}
    command: bash run-debug.sh
    stop_grace_period: 1s
    ports:
      - 6890:80
    volumes:
      - ./configs/lovekit.yaml:/workspace/config.yaml
  minio:
    command: server /data
    environment:
      MINIO_ROOT_PASSWORD: minio_root_password
      MINIO_ROOT_USER: minio_root_user
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    ports:
      - 6891:9000
  initc:
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_HOST: http://minio:9000
      MINIO_ROOT_PASSWORD: minio_root_password
      MINIO_ROOT_USER: minio_root_user
    image: jhnnsrs/init:nightly
    volumes:
      - ./configs/minio.yaml:/workspace/config.yaml
